<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dmart Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f7ff;
}

.container{
    width:400px;
    background:#fff;
    border:2px solid #1f4ed8;
    border-radius:15px;
    padding:40px 30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.profile{
    width:100px;
    height:100px;
    border:2px solid #1f4ed8;
    border-radius:50%;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
}

.profile i{
    font-size:50px;
    color:#1f4ed8;
}

h2{
    text-align:center;
    color:#1f4ed8;
    margin:20px 0;
}

.input-group{
    margin-bottom:20px;
}

.input-box{
    display:flex;
    align-items:center;
    border-bottom:1px solid #aaa;
    padding:10px 0;
}

.input-box i{
    color:#1f4ed8;
    margin-right:10px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:15px;
}

.eye{
    cursor:pointer;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin-bottom:20px;
}

.options a{
    color:#1f4ed8;
    text-decoration:none;
}

.login-btn{
    width:100%;
    padding:12px;
    background:white;
    border:2px solid #1f4ed8;
    color:#1f4ed8;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    background:#1f4ed8;
    color:white;
}

.social-title{
    text-align:center;
    margin:25px 0 15px;
}

.social{
    display:flex;
    justify-content:center;
    gap:20px;
}

.social button{
    width:60px;
    height:50px;
    border:1px solid #1f4ed8;
    background:white;
    cursor:pointer;
    border-radius:5px;
}

.social i{
    font-size:22px;
    color:#1f4ed8;
}

.signup{
    text-align:center;
    margin-top:25px;
}

.signup a{
    color:#1f4ed8;
    font-weight:bold;
}

.error{
    color:red;
    font-size:14px;
    margin-top:5px;
}

.brand{
    text-align:center;
    color:#1f4ed8;
    margin-bottom:15px;
}

.brand h1{
    font-size:36px;
}

.brand p{
    font-size:15px;
}

@media(max-width:450px){
    .container{
        width:95%;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="brand">
        <h1>Dmart</h1>
        <p>Shopping Management System</p>
    </div>

    <div class="profile">
        <i class="fa-regular fa-user"></i>
    </div>

    <h2>Log In</h2>

    <form id="loginForm">

        <div class="input-group">
            <div class="input-box">
                <i class="fa-regular fa-envelope"></i>
                <input type="email"
                       id="email"
                       placeholder="Email or Phone Number">
            </div>
            <div id="emailError" class="error"></div>
        </div>

        <div class="input-group">
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>

                <input type="password"
                       id="password"
                       placeholder="Password">

                <i class="fa-regular fa-eye eye"
                   onclick="togglePassword()"></i>
            </div>
            <div id="passwordError" class="error"></div>
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">
            Log In
        </button>

        <div class="social-title">
            Login with
        </div>

        <div class="social">
            <button type="button">
                <i class="fa-brands fa-google"></i>
            </button>

            <button type="button">
                <i class="fa-brands fa-apple"></i>
            </button>
        </div>

        <div class="signup">
            Don't have an account?
            <a href="register.html">Register Now</a>
        </div>

    </form>

</div>

<script>

function togglePassword(){
    const password=document.getElementById("password");

    if(password.type==="password"){
        password.type="text";
    }
    else{
        password.type="password";
    }
}

document.getElementById("loginForm")
.addEventListener("submit",function(e){

    e.preventDefault();

    let email=document.getElementById("email").value.trim();
    let password=document.getElementById("password").value.trim();

    let valid=true;

    document.getElementById("emailError").innerHTML="";
    document.getElementById("passwordError").innerHTML="";

    if(email===""){
        document.getElementById("emailError").innerHTML=
        "Email is required";
        valid=false;
    }

    if(password===""){
        document.getElementById("passwordError").innerHTML=
        "Password is required";
        valid=false;
    }

    if(valid){
        alert("Login Successful");
    }

});
</script>

</body>
</html>
