<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dmart Register</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f7ff;
}

.container{
    width:420px;
    background:#fff;
    border:2px solid #1f4ed8;
    border-radius:15px;
    padding:35px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.brand{
    text-align:center;
    color:#1f4ed8;
    margin-bottom:20px;
}

.brand h1{
    font-size:34px;
}

.brand p{
    font-size:15px;
}

.profile{
    width:90px;
    height:90px;
    border:2px solid #1f4ed8;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
}

.profile i{
    font-size:45px;
    color:#1f4ed8;
}

h2{
    text-align:center;
    color:#1f4ed8;
    margin:20px 0;
}

.input-group{
    margin-bottom:15px;
}

.input-box{
    display:flex;
    align-items:center;
    border-bottom:1px solid #aaa;
    padding:10px 0;
}

.input-box i{
    color:#1f4ed8;
    margin-right:10px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:15px;
}

.eye{
    cursor:pointer;
}

.register-btn{
    width:100%;
    padding:12px;
    border:2px solid #1f4ed8;
    background:white;
    color:#1f4ed8;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

.register-btn:hover{
    background:#1f4ed8;
    color:white;
}

.error{
    color:red;
    font-size:13px;
    margin-top:4px;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#1f4ed8;
    font-weight:bold;
    text-decoration:none;
}

@media(max-width:500px){
    .container{
        width:95%;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="brand">
        <h1>Dmart</h1>
        <p>Shopping Management System</p>
    </div>

    <div class="profile">
        <i class="fa-regular fa-user"></i>
    </div>

    <h2>Create Account</h2>

    <form id="registerForm">

        <div class="input-group">
            <div class="input-box">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="fullname" placeholder="Full Name">
            </div>
            <div id="nameError" class="error"></div>
        </div>

        <div class="input-group">
            <div class="input-box">
                <i class="fa-solid fa-phone"></i>
                <input type="text" id="phone" placeholder="Phone Number">
            </div>
            <div id="phoneError" class="error"></div>
        </div>

        <div class="input-group">
            <div class="input-box">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address">
            </div>
            <div id="emailError" class="error"></div>
        </div>

        <div class="input-group">
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
                <i class="fa-regular fa-eye eye" onclick="togglePassword('password')"></i>
            </div>
            <div id="passwordError" class="error"></div>
        </div>

        <div class="input-group">
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
                <i class="fa-regular fa-eye eye" onclick="togglePassword('confirmPassword')"></i>
            </div>
            <div id="confirmError" class="error"></div>
        </div>

        <button type="submit" class="register-btn">
            Register
        </button>

        <div class="login-link">
            Already have an account?
            <a href="index.html">Login Now</a>
        </div>

    </form>

</div>

<script>

function togglePassword(id){
    const field = document.getElementById(id);

    if(field.type==="password"){
        field.type="text";
    }else{
        field.type="password";
    }
}

document.getElementById("registerForm")
.addEventListener("submit",function(e){

    e.preventDefault();

    let name=document.getElementById("fullname").value.trim();
    let phone=document.getElementById("phone").value.trim();
    let email=document.getElementById("email").value.trim();
    let password=document.getElementById("password").value.trim();
    let confirm=document.getElementById("confirmPassword").value.trim();

    document.getElementById("nameError").innerHTML="";
    document.getElementById("phoneError").innerHTML="";
    document.getElementById("emailError").innerHTML="";
    document.getElementById("passwordError").innerHTML="";
    document.getElementById("confirmError").innerHTML="";

    let valid=true;

    if(name===""){
        document.getElementById("nameError").innerHTML="Enter Full Name";
        valid=false;
    }

    if(phone.length!==10){
        document.getElementById("phoneError").innerHTML="Enter Valid 10-digit Phone Number";
        valid=false;
    }

    if(email===""){
        document.getElementById("emailError").innerHTML="Enter Email Address";
        valid=false;
    }

    if(password.length<6){
        document.getElementById("passwordError").innerHTML="Password must be at least 6 characters";
        valid=false;
    }

    if(password!==confirm){
        document.getElementById("confirmError").innerHTML="Passwords do not match";
        valid=false;
    }

    if(valid){
        alert("Registration Successful!");
        window.location.href="index.html";
    }

});

</script>

</body>
</html>
